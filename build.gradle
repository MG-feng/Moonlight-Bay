plugins {
    id 'java-library'
    id 'maven-publish'
    id 'idea'
}

// 只在 NeoForge 和 Forge 构建时应用这些插件
if (project.properties['loader'] == 'neoforge') {
    apply plugin: 'net.neoforged.moddev'
} else if (project.properties['loader'] == 'forge') {
    apply plugin: 'net.minecraftforge.gradle'
    apply plugin: 'org.spongepowered.mixin'
}

tasks.named('wrapper', Wrapper).configure {
    distributionType = Wrapper.DistributionType.BIN
}

version = mod_version
group = mod_group_id

base {
    archivesName = mod_id
}

sourceSets.main.resources {
    srcDir('src/generated/resources')
    exclude("**/*.bbmodel")
    exclude("src/generated/**/.cache")
}

repositories {
    mavenCentral()
    maven {
        name = "Fabric"
        url = "https://maven.fabricmc.net/"
    }
    maven {
        name = "Forge"
        url = "https://maven.minecraftforge.net/"
    }
    maven {
        name = "NeoForge"
        url = "https://maven.neoforged.net/releases/"
    }
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

// ========== NeoForge 配置 ==========
if (project.properties['loader'] == 'neoforge') {
    neoForge {
        version = project.neo_version
        
        parchment {
            mappingsVersion = project.parchment_mappings_version
            minecraftVersion = project.parchment_minecraft_version
        }
        
        runs {
            client {
                client()
                systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
            }
            server {
                server()
                programArgument '--nogui'
                systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
            }
            gameTestServer {
                type = "gameTestServer"
                systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
            }
            data {
                data()
                programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
            }
            configureEach {
                systemProperty 'forge.logging.markers', 'REGISTRIES'
                logLevel = org.slf4j.event.Level.DEBUG
            }
        }
        
        mods {
            "${mod_id}" {
                sourceSet(sourceSets.main)
            }
        }
    }
}

// ========== Forge 配置 ==========
if (project.properties['loader'] == 'forge') {
    minecraft {
        mappings channel: 'official', version: project.minecraft_version
        
        runs {
            client {
                workingDirectory project.file('run')
                property 'forge.logging.markers', 'REGISTRIES'
                property 'forge.logging.console.level', 'debug'
                mods {
                    "${mod_id}" {
                        source sourceSets.main
                    }
                }
            }
            
            server {
                workingDirectory project.file('run')
                property 'forge.logging.markers', 'REGISTRIES'
                property 'forge.logging.console.level', 'debug'
                mods {
                    "${mod_id}" {
                        source sourceSets.main
                    }
                }
            }
            
            data {
                workingDirectory project.file('run')
                property 'forge.logging.markers', 'REGISTRIES'
                property 'forge.logging.console.level', 'debug'
                args '--mod', mod_id, '--all', '--output', file('src/generated/resources/'), '--existing', file('src/main/resources/')
                mods {
                    "${mod_id}" {
                        source sourceSets.main
                    }
                }
            }
        }
    }
}

// ========== Fabric 配置 ==========
if (project.properties['loader'] == 'fabric') {
    apply plugin: 'fabric-loom'
    
    loom {
        runs {
            client {
                client()
                configName = "Fabric Client"
            }
            server {
                server()
                configName = "Fabric Server"
            }
        }
    }
}

configurations {
    runtimeClasspath.extendsFrom localRuntime
    // 为不同平台分离依赖
    neoforgeImplementation { extendsFrom implementation }
    forgeImplementation { extendsFrom implementation }
    fabricImplementation { extendsFrom implementation }
}

dependencies {
    // 通用依赖
    implementation "com.google.code.gson:gson:2.10.1"
    
    // 平台特定依赖
    if (project.properties['loader'] == 'neoforge') {
        implementation "net.neoforged:neoforge:${project.neo_version}"
    }
    
    if (project.properties['loader'] == 'forge') {
        implementation "net.minecraftforge:forge:${project.forge_version}"
    }
    
    if (project.properties['loader'] == 'fabric') {
        minecraft "com.mojang:minecraft:${project.minecraft_version}"
        mappings loom.officialMojangMappings()
        modImplementation "net.fabricmc:fabric-loader:${project.fabric_loader_version}"
        modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"
    }
}

// 处理资源文件重复问题
processResources {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    
    // 根据 loader 排除不需要的文件
    if (project.properties['loader'] == 'fabric') {
        exclude 'META-INF/neoforge.mods.toml'
        exclude 'META-INF/mods.toml'
        // Fabric 使用 fabric.mod.json
    }
    
    if (project.properties['loader'] == 'neoforge') {
        exclude 'fabric.mod.json'
        exclude 'META-INF/mods.toml'
    }
    
    if (project.properties['loader'] == 'forge') {
        exclude 'fabric.mod.json'
        exclude 'META-INF/neoforge.mods.toml'
    }
    
    // 替换属性
    filesMatching(['fabric.mod.json', 'META-INF/neoforge.mods.toml', 'META-INF/mods.toml']) {
        expand project.properties
    }
}

// 如果需要生成模组元数据（仅 NeoForge）
if (project.properties['loader'] == 'neoforge') {
    var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
        var replaceProperties = [
            minecraft_version      : project.minecraft_version,
            minecraft_version_range: project.minecraft_version_range,
            neo_version            : project.neo_version,
            loader_version_range   : project.loader_version_range,
            mod_id                 : project.mod_id,
            mod_name               : project.mod_name,
            mod_license            : project.mod_license,
            mod_version            : project.mod_version,
        ]
        inputs.properties replaceProperties
        expand replaceProperties
        from "src/main/templates"
        into "build/generated/sources/modMetadata"
    }
    sourceSets.main.resources.srcDir generateModMetadata
    if (neoForge != null) {
        neoForge.ideSyncTask generateModMetadata
    }
}

publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
