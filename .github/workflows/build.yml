name: Debug Build Environment

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ultimate Directory Structure Debug
        run: |
          echo "====================================================="
          echo "1. 当前工作目录"
          pwd
          echo "-----------------------------------------------------"
          echo "2. 根目录下所有文件和文件夹 (ls -la)"
          ls -la
          echo "-----------------------------------------------------"
          echo "3. 查找 'gradlew' 文件"
          find . -name "gradlew" -type f
          echo "-----------------------------------------------------"
          echo "4. 查找 'gradle-wrapper.jar' 文件"
          find . -name "gradle-wrapper.jar" -type f
          echo "-----------------------------------------------------"
          echo "5. 检查 'gradlew' 权限和内容前5行"
          if [ -f "gradlew" ]; then
            ls -la gradlew
            echo "--- 文件内容前5行 ---"
            head -n 5 gradlew
          else
            echo "根目录下没有 gradlew 文件"
          fi
          echo "-----------------------------------------------------"
          echo "6. 尝试执行 'gradlew' (模拟)"
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            # 这行不会真正执行，只是用来查看错误
            bash -n gradlew
            if [ $? -eq 0 ]; then
              echo "gradlew 脚本语法正确"
            else
              echo "gradlew 脚本语法错误"
            fi
          else
            echo "无法执行，因为文件不存在"
          fi
          echo "====================================================="

      - name: Simulate Gradle Build (to check for jar)
        run: |
          echo "尝试定位gradle-wrapper.jar的实际位置..."
          JAR_PATH=$(find . -name "gradle-wrapper.jar" -type f | head -1)
          if [ -n "$JAR_PATH" ]; then
            echo "找到JAR文件: $JAR_PATH"
            echo "检查JAR文件是否有效..."
            unzip -t "$JAR_PATH" > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              echo "JAR文件结构完整。"
            else
              echo "JAR文件损坏或不是一个有效的zip文件。"
            fi
          else
            echo "未找到gradle-wrapper.jar文件。"
          fi
