name: Build Moonlight Bay

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        loader: [neoforge, forge, fabric]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Debug - List all files
        run: |
          echo "当前目录: $(pwd)"
          echo "列出所有文件:"
          ls -la
          echo ""
          echo "检查 gradlew 文件是否存在:"
          if [ -f "gradlew" ]; then
            echo "✅ gradlew 文件存在"
            ls -la gradlew
          else
            echo "❌ gradlew 文件不存在"
          fi
          echo ""
          echo "查找整个仓库中的 gradlew:"
          find . -name "gradlew" -type f
          echo ""
          echo "查找整个仓库中的 gradle-wrapper.jar:"
          find . -name "gradle-wrapper.jar" -type f
          echo ""
          echo "目录结构:"
          find . -type d | head -20

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build -Ploader=${{ matrix.loader }} --no-daemon

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MoonlightBay-${{ matrix.loader }}
          path: build/libs/*.jar
