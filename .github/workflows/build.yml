name: Build Moonlight Bay

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        loader: [neoforge, forge, fabric]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          # 删除可能损坏的 wrapper jar
          rm -f gradle/wrapper/gradle-wrapper.jar
          # 重新生成正确的 wrapper 文件
          ./gradlew wrapper --gradle-version 8.5
          # 正式构建
          ./gradlew build -Ploader=${{ matrix.loader }} --no-daemon

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MoonlightBay-${{ matrix.loader }}
          path: build/libs/*.jar
