name: Build Moonlight Bay

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        loader: [neoforge, forge, fabric]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: chmod +x gradlew && ./gradlew build -Ploader=${{ matrix.loader }} --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: MoonlightBay-${{ matrix.loader }}
          path: build/libs/*.jar
